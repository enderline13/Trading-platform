syntax = "proto3";

package market;

import "google/protobuf/empty.proto";
import "google/protobuf/timestamp.proto";
import "common.proto";

message InstrumentsList {
  repeated common.Instrument instruments = 1;
}

message InstrumentID {
  uint64 instrument_id = 1;
}

message OrderBook {

  repeated common.OrderBookLevel bids = 1;

  repeated common.OrderBookLevel asks = 2;
}

message OrderBookUpdate {

  repeated common.OrderBookLevel bids = 1;

  repeated common.OrderBookLevel asks = 2;
}

message RecentTrades {
  repeated common.Trade trades = 1;
}

message InstrumentId { uint64 id = 1; }

message CandlesRequest {

  uint64 instrument_id = 1;

  google.protobuf.Timestamp begin = 2;

  google.protobuf.Timestamp end = 3;

  uint32 limit = 4;
}

message Candles {
  repeated common.Candle candles = 1;
}

service MarketService {
  rpc ListInstruments(google.protobuf.Empty)
      returns (InstrumentsList);

  rpc GetInstrumentDetails(InstrumentId)
      returns (common.Instrument);

  rpc GetOrderBook(InstrumentID)
      returns (OrderBook);
  rpc GetRecentTrades(InstrumentID)
      returns (RecentTrades);
  rpc GetCandles(CandlesRequest)
      returns (Candles);

  rpc StreamOrderBook(InstrumentID)
      returns (stream OrderBookUpdate);
  rpc StreamTrades(InstrumentID)
      returns (stream common.Trade);
  rpc StreamCandles(CandlesRequest)
      returns (stream common.Candle);
}