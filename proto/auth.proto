syntax = "proto3";

package auth;

message RegisterRequest {
  string username = 1;
  string email = 2;
  string password = 3;
}

message RegisterResponse {
  uint64 user_id = 1;
  bool success = 2;
}

message LoginRequest {
  string username = 1;
  string password = 2;
}

message LoginResponse {
  string token = 1;
  bool success = 2; // У тебя изначально не было, нужно ли нам всё таки это поле или jwt сам хранит произошла ли авторизация успешно?
}

message Empty {

}

service Auth {
  rpc registerUser (RegisterRequest) returns (RegisterResponse);
  rpc login (LoginRequest) returns (LoginResponse);
  rpc getCurrentUser (Empty) returns (Empty); // Не понял что здесь давать и возвращать, у тебя пусто
}