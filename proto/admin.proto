syntax = "proto3";

import "common.proto";
import "auth.proto";
import "google/protobuf/empty.proto";

package admin;

message FundRequest {
  uint64 user_id = 1;
  common.Decimal amount = 2;
}

message SystemStatus {
  bool is_running = 1;
  uint64 active_orders_count = 2;
  uint64 total_users_count = 3;
  string server_version = 4;
  string uptime = 5;
}

message AddPositionRequest {
  uint64 user_id = 1;
  uint64 instrument_id = 2;
  common.Decimal quantity = 3;
}

message SystemStateRequest {
  bool run_trading = 1; // true - RUNNING, false - STOPPED
}

message UserInfo {
  uint64 id = 1;
  string username = 2;
  string email = 3;
  auth.User.Role role = 4;
  bool is_active = 5;
}

message ListUsersResponse {
  repeated UserInfo users = 1;
}

message SetUserRoleRequest {
  uint64 user_id = 1;
  auth.User.Role role = 2;
}

message SetUserActiveRequest {
  uint64 user_id = 1;
  bool is_active = 2;
}

message DeleteInstrumentRequest {
  uint64 instrument_id = 1;
}

service AdminService {
  rpc AddInstrument(common.Instrument) returns (google.protobuf.Empty);
  rpc UpdateInstrument(common.Instrument) returns (google.protobuf.Empty);
  rpc FundUserAccount(FundRequest) returns (google.protobuf.Empty); // Ручное начисление денег
  rpc GetSystemStatus(google.protobuf.Empty) returns (SystemStatus); // Нагрузка, кол-во активных ордеров
  rpc SetSystemState(SystemStateRequest) returns (google.protobuf.Empty);
  rpc AddPosition(AddPositionRequest) returns (google.protobuf.Empty);

  rpc DeleteInstrument(DeleteInstrumentRequest) returns (google.protobuf.Empty);
  rpc ListUsers(google.protobuf.Empty) returns (ListUsersResponse);
  rpc SetUserRole(SetUserRoleRequest) returns (google.protobuf.Empty);
  rpc SetUserActive(SetUserActiveRequest) returns (google.protobuf.Empty);
}